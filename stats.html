<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProspEngine — Player Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="ProspEngine" class="brand-logo" />
    </a>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="stats.html" class="active" data-i18n="nav.stats">Player Stats</a>
      <a href="dashboard.html" data-i18n="nav.dashboard">Dashboard</a>
      <button id="langBtn" class="btn btn-ghost" type="button">🌐 EN</button>
    </div>
  </div>
</nav>

<section class="section">
  <div class="wrap">
    <div class="section-head reveal">
      <div class="eyebrow" data-i18n="stats.eyebrow">Statistics</div>
      <h2 data-i18n="stats.title">Player Stats</h2>
      <p data-i18n="stats.sub">Search a player and view ELO, rank, win rate and more.</p>
    </div>

    <div class="server-bar" id="serverBar"></div>

    <div class="search-box reveal">
      <input type="text" id="playerSearch" data-i18n-ph="stats.searchPh" placeholder="Search a player…" />
      <button class="btn btn-primary" id="searchBtn" data-i18n="stats.searchBtn">Search</button>
    </div>

    <div id="playerResult"></div>

    <div id="lbWrap">
      <div class="section-head reveal" style="margin-top:70px">
        <div class="eyebrow" data-i18n="stats.topEyebrow">Top players</div>
        <h2 data-i18n="stats.leaderboard">Leaderboard</h2>
      </div>

      <div class="lb reveal" id="leaderboard">
        <div class="lb-row head">
          <div>#</div><div data-i18n="lb.player">Player</div><div>ELO</div><div class="col-hide" data-i18n="lb.wins">Wins</div><div data-i18n="lb.ratio">Ratio</div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="wrap">
    <div class="owner">
      <img src="assets/owner-logo.png" alt="Kayolomolo logo" />
      <div>
        <small data-i18n="footer.builtby">Built with passion by</small>
        <b>Kayolomolo</b>
      </div>
    </div>
    <div class="muted" data-i18n="footer.copyright">© 2026 ProspEngine · Powered by Community</div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
