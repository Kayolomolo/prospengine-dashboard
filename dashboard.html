<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProspEngine — Server Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="ProspEngine" class="brand-logo" />
    </a>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="stats.html" data-i18n="nav.stats">Player Stats</a>
      <a href="dashboard.html" class="active" data-i18n="nav.dashboard">Dashboard</a>
      <button id="langBtn" class="btn btn-ghost" type="button">🌐 EN</button>
    </div>
  </div>
</nav>

<main id="dashView" class="wrap">
  <div class="dash-head">
    <div>
      <h1 data-i18n="dash.title">Server Dashboard</h1>
      <p data-i18n="dash.subtitle">Log in with Discord and manage your server's features.</p>
    </div>
  </div>

  <div class="server-bar" id="serverBar"></div>

  <div class="toggle-grid" id="toggleGrid"></div>

  <div class="save-bar" style="display:none">
    <span id="saveStatus" data-i18n="dash.saveStatus">Changes are saved to your bot.</span>
    <button class="btn btn-primary" id="saveBtn" data-i18n="dash.saveBtn">💾 Save settings</button>
  </div>
</main>

<div class="toast" id="toast">Saved!</div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
