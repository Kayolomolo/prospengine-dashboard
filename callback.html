<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logging in… — ProspEngine</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div style="min-height:100vh;display:grid;place-items:center;text-align:center;">
  <div>
    <div style="font-size:40px;margin-bottom:14px;">🚀</div>
    <h2 id="msg">Logging you in…</h2>
    <p class="muted" style="margin-top:8px;">One moment…</p>
  </div>
</div>
<script>
(function () {
  var hash = new URLSearchParams(location.hash.replace(/^#/, ""));
  var token = hash.get("access_token");
  if (token) {
    localStorage.setItem("prosp_discord_token", token);
  } else {
    document.getElementById("msg").textContent = "Login failed. Please try again.";
  }
  var ret = sessionStorage.getItem("prosp_return") || "dashboard.html";
  setTimeout(function () { location.replace(ret); }, token ? 400 : 2000);
})();
</script>
</body>
</html>
